
# --- UX --- #
osc=no
osd-bar=no
osd-font=Open Sans
cursor-autohide=500
taskbar-progress=no
keep-open=yes
snap-window=yes
msg-level=all=info,display-tags=warn
autofit-larger=80%x80%
autofit-smaller=20%x20%

# --- Video Processing --- #
vo=gpu-next
gpu-api=d3d11
gpu-context=d3d11
hwdec=d3d11va-copy
hwdec-codecs=all
demuxer-thread=yes

# --- Audio --- #
replaygain=album
volume=100
volume-max=150
audio-pitch-correction=no
audio-channels=auto-safe
alang=eng,en

# --- Subtitles --- #
sub-font=Space Mono
sub-scale=1.0
sub-gauss=1.0
sub-gray=yes
sub-ass-override=no
sub-fix-timing=yes
blend-subtitles=yes
sub-auto=fuzzy
slang=en,eng
watch-later-options-remove=sub-pos

# --- Streaming --- #
ytdl=yes
ytdl-format=bestvideo[vcodec^=avc1]+bestaudio/best
script-opts=ytdl_hook-try_ytdl_first=yes
script-opts='ytdl_hook-exclude="%.webm$|%.ts$|%.mp3$|%.m3u8$|%.m3u$|%.mkv$|%.mp4$|%.VOB$"'

# --- Playback --- #
pause=yes
loop-file=no
loop-playlist=no
autocreate-playlist=no
resume-playback=yes
hr-seek=yes
deinterlace=no
panscan=0.0
video-crop=0x0+0+0

# --- Color --- #
target-peak=auto
vf=format=colorlevels=full:colormatrix=auto
video-output-levels=full

# --- Motion Interpolation --- #
video-sync=display-resample
interpolation=yes
tscale=oversample

# --- Dithering --- #
dither-depth=auto
temporal-dither=yes
dither=fruit

# --- Debanding --- #
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=16
deband-grain=4

# --- Anti-Ringing --- #
scale-antiring=0.6

# --- Scaling --- #
scale=ewa_lanczos
dscale=catmull_rom
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes

# ---- Base Profiles ---- #
profile=high-quality
libplacebo-opts=preset=high_quality


# ------------------------------ #
# ---- Conditional Profiles ---- #
# ------------------------------ #

[av1-sw-decode]
profile-cond='get("video-format", "") == "av1"'
hwdec=no
glsl-shaders=""
profile-restore=copy

[thumbfast]
profile-cond='get("input-ipc-server") ~= "" and get("input-ipc-server") ~= nil'
hwdec=auto
audio=no
sub=no
profile=fast
libplacebo-opts=preset=fast
glsl-shaders=""
profile-restore=copy


# ------------------------ #
# ---- Color Profiles ---- #
# ------------------------ #

[hdr]
profile-cond='p["video-params/gamma"] == "pq"'
target-trc=auto
tone-mapping=spline
target-contrast=auto
hdr-compute-peak=yes
profile-restore=copy

[sdr]
profile-cond='p["video-params/gamma"] ~= "pq"'
target-trc=gamma2.2
tone-mapping=bt.2446a
tone-mapping-param=0.3
profile-restore=copy


# ------------------------------- #
# ---- Anime Shader Profiles ---- #
# ------------------------------- #

[anime-hq-a]
profile-desc=anime-hq-a
osd-msg1="Profile: anime-hq-a"
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl"
glsl-shaders-append="~~/shaders/Anime4K_Restore_CNN_VL.glsl"
glsl-shaders-append="~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"
glsl-shaders-append="~~/shaders/Anime4K_AutoDownscalePre_x2.glsl"
glsl-shaders-append="~~/shaders/Anime4K_AutoDownscalePre_x4.glsl"
glsl-shaders-append="~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"
profile-restore=copy

[anime-hq-b]
profile-desc=anime-hq-b
osd-msg1="Profile: anime-hq-b"
glsl-shaders="~~/shaders/Anime4K/Anime4K_Clamp_Highlights.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Restore_CNN_Soft_VL.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Upscale_CNN_x2_VL.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_AutoDownscalePre_x2.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_AutoDownscalePre_x4.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Upscale_CNN_x2_M.glsl"
profile-restore=copy

[anime-hq-c]
profile-desc=anime-hq-c
osd-msg1="Profile: anime-hq-c"
glsl-shaders="~~/shaders/Anime4K/Anime4K_Clamp_Highlights.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Upscale_Denoise_CNN_x2_VL.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_AutoDownscalePre_x2.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_AutoDownscalePre_x4.glsl"
glsl-shaders-append="~~/shaders/Anime4K/Anime4K_Upscale_CNN_x2_M.glsl"
profile-restore=copy


# ----------------------------- #
# ---- UHD Shader Profiles ---- #
# ----------------------------- #

[4k60] # 2160p @ 60fps (3840x2160 UHDTV)
profile-desc=4k60
osd-msg1="Profile: full-hd60"
profile-cond=((width ==3840 and height ==2160) and p["estimated-vf-fps"]>=31)
interpolation=no # no motion interpolation needed at 60fps
deband=no # UHD content is typically wide color gamut; debanding risks clipping fine gradients
glsl-shader="~~/shaders/CfL_Prediction.glsl" # UHD is YUV420: chroma upscaling still needed
profile-restore=copy

[4k30] # 2160p @ 24-30fps (3840x2160 UHDTV — common for camera footage, streaming)
profile-desc=4k30
osd-msg1="Profile: 4k30"
profile-cond=((width ==3840 and height ==2160) and p["estimated-vf-fps"]<31)
deband=no # UHD content is typically wide color gamut; debanding risks clipping fine gradients
glsl-shader="~~/shaders/CfL_Prediction.glsl" # UHD is YUV420: chroma upscaling still needed
profile-restore=copy


# ---------------------------- #
# ---- HD Shader Profiles ---- #
# ---------------------------- #

[full-hd60] # 1080p @ 60fps (progressive ATSC)
profile-desc=full-hd60
osd-msg1="Profile: full-hd60"
profile-cond=((width ==1920 and height ==1080) and not p["video-frame-info/interlaced"] and p["estimated-vf-fps"]>=31)
interpolation=no # no motion interpolation needed at 60fps
glsl-shader="~~/shaders/ArtCNN_C4F16.glsl" # luma upscaling (2x doubler)
glsl-shader="~~/shaders/CfL_Prediction.glsl" # HD is YUV420: chroma upscaling needed
profile-restore=copy

[full-hd30] # 1080p @ 24-30fps (NextGen TV/ATSC 3.0, progressive Blu-ray)
profile-desc=full-hd30
osd-playing-msg="Profile: full-hd30"
profile-cond=((width ==1920 and height ==1080) and not p["video-frame-info/interlaced"] and p["estimated-vf-fps"]<31)
glsl-shader="~~/shaders/ArtCNN_C4F16.glsl" # luma upscaling (2x doubler)
glsl-shader="~~/shaders/CfL_Prediction.glsl" # HD is YUV420: chroma upscaling needed
profile-restore=copy

[full-hd-interlaced] # 1080i @ 24-30fps (HDTV, interlaced Blu-rays)
profile-desc=full-hd-interlaced
osd-msg1="Profile: full-hd-interlaced"
profile-cond=((width ==1920 and height ==1080) and p["video-frame-info/interlaced"] and p["estimated-vf-fps"]<31)
deinterlace=yes # MPV uses BWDIF (motion-adaptive) by default
glsl-shader="~~/shaders/ArtCNN_C4F16.glsl" # luma upscaling (2x doubler)
glsl-shader="~~/shaders/CfL_Prediction.glsl" # HD is YUV420: chroma upscaling needed
profile-restore=copy

[hd] # 720p @ 60fps (HDTV, Blu-ray — progressive)
profile-desc=hd
osd-msg1="Profile: hd"
profile-cond=(width ==1280 and height ==720)
interpolation=no # no motion interpolation needed at 60fps
glsl-shader="~~/shaders/ravu-zoom-ar-r3.hook" # luma upscaling (arbitrary ratio, single pass)
glsl-shader="~~/shaders/CfL_Prediction.glsl" # HD is YUV420: chroma upscaling needed
profile-restore=copy


# ---------------------------- #
# ---- SD Shader Profiles ---- #
# ---------------------------- #

[sdtv-ntsc] # 640x480, 704x480, 720x480 @ 30fps (NTSC DVD — interlaced)
profile-desc=sdtv-ntsc
osd-msg1="Profile: sdtv-ntsc"
profile-cond=((width ==640 and height ==480) or (width ==704 and height ==480) or (width ==720 and height ==480))
deinterlace=yes # MPV uses BWDIF by default
glsl-shader="~~/shaders/ravu-zoom-ar-r3.hook" # luma upscaling (arbitrary ratio, single pass)
glsl-shader="~~/shaders/CfL_Prediction.glsl" # SD is YUV420: chroma upscaling needed
profile-restore=copy

[sdtv-pal] # 352x576, 480x576, 544x576, 720x576 @ 30fps (PAL broadcast or DVD — interlaced)
profile-desc=sdtv-pal
osd-msg1="Profile: sdtv-pal"
profile-cond=((width ==352 and height ==576) or (width ==480 and height ==576) or (width ==544 and height ==576) or (width ==720 and height ==576))
deinterlace=yes # MPV uses BWDIF by default
glsl-shader="~~/shaders/ravu-zoom-ar-r3.hook" # luma upscaling (arbitrary ratio, single pass)
glsl-shader="~~/shaders/CfL_Prediction.glsl" # SD is YUV420: chroma upscaling needed
profile-restore=copy
