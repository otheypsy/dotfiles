
# --- Interface and Experience ---
osc=no
osd-bar=no
autocreate-playlist=no
taskbar-progress=no
pause=yes
keep-open=yes

# --- Core Renderer ---
vo=gpu-next
gpu-api=d3d11
hwdec=d3d11va-copy

# --- GSYNC ---
video-sync=display-resample
interpolation=no
tscale=oversample

# --- High Quality Profiles ---
profile=high-quality

# --- libplacebo Specific Settings ---
libplacebo-opts=preset=high_quality
deband=yes
deband-iterations=4
deband-threshold=35
deband-range=16
deband-grain=5

# --- Upscaling & Downscaling ---
scale=ewa_lanczossharp
downscale=catmull_rom
linear-downscaling=yes
sigmoid-upscaling=yes

# --- HDR to SDR Tone Mapping ---
target-colorspace-hint=yes
target-contrast=inf
tone-mapping=bt.2446a
tone-mapping-param=0.3
gamma-factor=1.0

# --- HDR to HDR / HDR Pass-through ---
target-peak=auto
peak-detect=yes

# --- Dithering ---
dither=error-diffusion
dither-depth=auto

# --- Anime/Animation Optimization ---
glsl-shader=~~/shaders/ravu-zoom-ar-r3.hook
scale=ewa_lanczos

# --- Streaming ---
ytdl-format=bestvideo[vcodec^=avc1]+bestaudio